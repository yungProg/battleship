<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
  </head>
  <body>
    <header class="header">
      <h1>Battleship</h1>
      <form action="#">
        <fieldset>
          <legend>PLAY OPTIONS</legend>
          <p>Select your opponent </p>
          <div>
            <input type="radio" name="play-option" id="ai" class="ai" value="ai" checked>
            <label for="ai" class="ai-label">AI</label>
          </div>
          <div>
            <input type="radio" name="play-option" id="human" class="human" value="human">
            <label for="human" class="human-label">Human</label>
          </div>
          <input type="submit" value="Play">
        </fieldset>
      </form>
    </header>
    <main class="main">
      <button type="button" class="pass-board hide"></button>
      <p class="current-player"></p>
      <p class="winner"></p>
      <div class="game-boards">
        <section class="player1-div current"></section>
        <section class="player2-div opponent"></section>
      </div>
    </main>
  </body>
</html>
